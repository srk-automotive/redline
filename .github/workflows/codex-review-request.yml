name: codex-review-request

on:
  pull_request_target:
    types: [opened, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  request-codex-review:
    name: request-codex-review
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Request exhaustive Codex review
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;
            const headSha = context.payload.pull_request.head.sha;
            const marker = `<!-- codex-review-request:${headSha} -->`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: pull_number,
              per_page: 100,
            });

            const alreadyRequested = comments.some((comment) => {
              return comment.user?.login === "github-actions[bot]" &&
                comment.body?.includes(marker);
            });

            if (alreadyRequested) {
              core.info(`Codex review was already requested for ${headSha}`);
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pull_number,
              body: [
                marker,
                "@codex review",
                "",
                "Please perform an exhaustive review of this pull request. Focus on correctness, regressions, security, data handling, error handling, and missing tests. Flag only issues that should block merging.",
              ].join("\n"),
            });
